[custom]
;DustinWin 轻量规则

;去广告：不支持
;Trackerslist 分流：不支持
;微软服务、谷歌服务、苹果服务、游戏服务：不支持
;游戏平台分流：不支持
;国外媒体分流：不支持
;AI 平台分流：不支持
;网络测试：不支持

ruleset=🎯 全球直连,clash-domain:https://github.com/DustinWin/domain-list-custom/releases/download/domains/private.list,86400
ruleset=🌎 国外域名,clash-domain:https://github.com/DustinWin/domain-list-custom/releases/download/domains/gfw.list,86400
ruleset=🇨🇳 国内域名,clash-domain:https://github.com/DustinWin/domain-list-custom/releases/download/domains/cn-lite.list,86400
ruleset=🎯 全球直连,clash-ipcidr:https://github.com/DustinWin/geoip/releases/download/ips/privateip.list,86400
ruleset=🀄️ 国内 IP,clash-ipcidr:https://github.com/DustinWin/geoip/releases/download/ips/cnip.list,86400
ruleset=🐟 漏网之鱼,[]FINAL

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]👉 手动选择`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点
custom_proxy_group=🇨🇳 国内域名`select`[]🎯 全球直连`[]🚀 节点选择
custom_proxy_group=🀄️ 国内 IP`select`[]🎯 全球直连`[]🚀 节点选择
custom_proxy_group=🌎 国外域名`select`[]🚀 节点选择`[]🎯 全球直连
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🎯 全球直连
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(🇭🇰|港|hk|hongkong|hong kong)`https://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)(🇹🇼|台|tw|taiwan|tai wan)`https://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(🇯🇵|日|jp|japan)`https://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)(🇸🇬|新|sg|singapore)`https://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)(🇺🇸|美|us|unitedstates|united states)`https://www.gstatic.com/generate_204`600,,100
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`600,,100
custom_proxy_group=👉 手动选择`select`.*

enable_rule_generator=true
overwrite_original_rules=true
