  - {name: 香港-故转,  <<: *BaseFB, proxies: [香港-手选, 香港-智能 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Hong_Kong.png}
  - {name: 日本-故转,  <<: *BaseFB, proxies: [日本-手选, 日本-智能 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Japan.png}
  - {name: 狮城-故转,  <<: *BaseFB, proxies: [狮城-手选, 狮城-智能 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Singapore.png}
  - {name: 美国-故转,  <<: *BaseFB, proxies: [美国-手选, 美国-智能 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/United_States.png}

  # 线路特性层 - 手动选择节点，根据自己需求选择节点，建议修改位置顺序发挥线路优势,（不需要该策略可以在组名上添加 # 注释）
  - { name: 香港-手选, type: select, include-all: true, <<: *FilterHK }
