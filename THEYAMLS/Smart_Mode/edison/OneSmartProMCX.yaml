rules:
# ==================== 特定IP分流规则 ====================
#- IP-CIDR,你需要的代理IP/32,Proxy                                     #需要强制走代理的IP
#- SRC-IP-CIDR,你需要走直连的IP/32,国内直连                             #需要强制走国内的IP

# ==================== 阻止 QUIC ====================
  - AND,((NETWORK,UDP),(DST-PORT,443),(RULE-SET,China)),国内直连         # 国内域名放行 QUIC
  - AND,((NETWORK,UDP),(DST-PORT,443),(RULE-SET,China-IP)),国内直连      # 国内 IP 放行 QUIC
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT                           # 海外阻止 QUIC，避免速度不佳

# --- 基础直连 ---
  - RULE-SET,Private,国内直连                      # 局域网域名直连 (路由后台/NAS)
  - RULE-SET,Private-IP,国内直连,no-resolve        # 局域网 IP 直连 (防止环路)
